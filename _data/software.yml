projects:
  - id: 1
    name: "lacuna"
    url: "https://github.com/mooreneural/lacuna"
    description: "Python tool for cryptic binding pocket discovery. Finds hidden druggable sites invisible in static protein structures. Generates conformational ensembles, detects pockets per conformer, clusters across the ensemble, and ranks by druggability and crypticity. Achieves 85% detection (17/20) on benchmark cryptic-pocket targets including K-Ras switch-II and T4L L99A. Outputs docking-ready Boltz YAML, AutoDock Vina configs, and PDB files."
    role: "Developer"
    languages:
      - name: "Python"
        icon: "fab fa-python"
        color: "#3776AB"
      - name: "Boltz-2"
        icon: "fas fa-atom"
        color: "#E74C3C"
      - name: "Structural Biology"
        icon: "fas fa-dna"
        color: "#27AE60"

  - id: 2
    name: "HelixDB"
    url: "https://github.com/mooreneural/HelixDB"
    description: "AI-native biomolecular storage format (.ptt) for structural biology ML pipelines. Converts mmCIF structures once and caches all tensors needed for training: atomic coordinates, backbone geometry, bond graphs, MSA alignments, and ESM2/ESM3 embeddings in a single Zarr/LZ4 container with memory-mapped lazy access. At 100,000-structure scale: structure loading drops from 3.7 hours to 5 minutes (45x), MSA generation from 4,000 hours to 2.2 hours (1,794x), and backbone-only loads run 6 to 284x faster than repeated mmCIF parsing. Verified end-to-end on Boltz 2. Supports PyTorch, JAX, NumPy, and cloud streaming via S3/GCS."
    role: "Developer"
    languages:
      - name: "Python"
        icon: "fab fa-python"
        color: "#3776AB"
      - name: "Zarr"
        icon: "fas fa-database"
        color: "#E67E22"
      - name: "CUDA"
        icon: "fas fa-microchip"
        color: "#76B900"


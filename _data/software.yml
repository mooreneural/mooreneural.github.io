projects:
  - id: 1
    name: "lacuna"
    url: "https://github.com/mooreneural/lacuna"
    description: "Python tool for cryptic binding pocket discovery. Finds hidden druggable sites invisible in static protein structures. Generates conformational ensembles, detects pockets per conformer, clusters across the ensemble, and ranks by druggability and crypticity. Achieves 85% detection (17/20) on benchmark cryptic-pocket targets including K-Ras switch-II and T4L L99A. Outputs docking-ready Boltz YAML, AutoDock Vina configs, and PDB files."
    role: "Developer"
    languages:
      - name: "Python"
        icon: "fab fa-python"
        color: "#3776AB"
      - name: "Boltz-2"
        icon: "fas fa-atom"
        color: "#E74C3C"
      - name: "Structural Biology"
        icon: "fas fa-dna"
        color: "#27AE60"

  - id: 2
    name: "HelixDB"
    url: "https://github.com/mooreneural/HelixDB"
    description: "Zero-parse biomolecular tensor storage (.ptt format) that eliminates repeated mmCIF parsing in structural biology ML pipelines. Convert once, load instantly: backbone coords, MSA tokens, bond graphs, and PLM embeddings (ESM2/ESM3) via Zarr/LZ4 with memory-mapped lazy access. Benchmarks: 34x faster feature assembly, 1,794x faster than JackHMMER MSA regeneration, ~16,000 structures/sec DataLoader throughput. Compatible with PyTorch, JAX, NumPy, and S3/GCS streaming."
    role: "Developer"
    languages:
      - name: "Python"
        icon: "fab fa-python"
        color: "#3776AB"
      - name: "Zarr"
        icon: "fas fa-database"
        color: "#E67E22"
      - name: "CUDA"
        icon: "fas fa-microchip"
        color: "#76B900"

  - id: 3
    name: "Lockon"
    url: "https://github.com/mooreneural/Lockon"
    private: true
    description: "Foundation model for antibody-drug conjugates (ADCs). Represents an ADC as a complete assembly (antibody, linker, payload, conjugation site, and drug-to-antibody ratio) and learns to predict binding, linker stability, payload release, efficacy, and toxicity. Built to model the conjugate as a whole, addressing a regime that single-molecule, single-structure models do not capture. Early development."
    role: "Developer"
    languages:
      - name: "Python"
        icon: "fab fa-python"
        color: "#3776AB"
      - name: "PyTorch"
        icon: "fas fa-brain"
        color: "#EE4C2C"
      - name: "Drug Discovery"
        icon: "fas fa-pills"
        color: "#8E44AD"

  - id: 4
    name: "Bicycle"
    url: "https://github.com/mooreneural/Bicycle"
    private: true
    description: "Structural-scoring pipeline for large-scale virtual screening of predicted receptor-ligand complexes. Computes RMSD over user-selected pocket residues between Boltz-predicted complexes and a panel of experimental receptor conformations, assigning each ligand a triage label for downstream prioritization. Implements the HTR2A (5-HT2A) screening workflow used in dissertation research, covering conformational states spanning hallucinogenic agonists (psilocin, LSD) and non-hallucinogenic antagonists (risperidone, ketanserin). 5/6 positive controls classified correctly."
    role: "Developer"
    languages:
      - name: "Python"
        icon: "fab fa-python"
        color: "#3776AB"
      - name: "Boltz"
        icon: "fas fa-atom"
        color: "#E74C3C"
      - name: "SLURM/HPC"
        icon: "fas fa-server"
        color: "#27AE60"

